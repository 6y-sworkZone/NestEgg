{% extends "base.html" %}

{% block title %}收支记录 - 个人理财助手{% endblock %}

{% block content %}
<div class="header">
    <h1>📝 收支记录</h1>
    <button class="btn btn-primary" onclick="openModal('addTransactionModal')">➕ 添加记录</button>
</div>

<div class="filters">
    <div class="form-group" style="margin-bottom: 0; min-width: 120px;">
        <label>类型</label>
        <select id="filterType" onchange="loadTransactions()">
            <option value="">全部</option>
            <option value="income">收入</option>
            <option value="expense">支出</option>
        </select>
    </div>
    <div class="form-group" style="margin-bottom: 0; min-width: 120px;">
        <label>分类</label>
        <select id="filterCategory" onchange="loadTransactions()">
            <option value="">全部</option>
            {% for c in categories %}
            <option value="{{ c.id }}">{{ c.icon }} {{ c.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group" style="margin-bottom: 0; min-width: 120px;">
        <label>账户</label>
        <select id="filterAccount" onchange="loadTransactions()">
            <option value="">全部</option>
            {% for a in accounts %}
            <option value="{{ a.id }}">{{ a.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group" style="margin-bottom: 0; min-width: 120px;">
        <label>开始日期</label>
        <input type="date" id="startDate" onchange="loadTransactions()">
    </div>
    <div class="form-group" style="margin-bottom: 0; min-width: 120px;">
        <label>结束日期</label>
        <input type="date" id="endDate" onchange="loadTransactions()">
    </div>
    <div class="form-group" style="margin-bottom: 0; min-width: 200px;">
        <label>搜索</label>
        <input type="text" id="keyword" placeholder="备注/标签..." onchange="loadTransactions()">
    </div>
    <button class="btn" onclick="loadTransactions()" style="background: #ecf0f1;">🔍 搜索</button>
</div>

<table>
    <thead>
        <tr>
            <th>日期</th>
            <th>类型</th>
            <th>分类</th>
            <th>账户</th>
            <th>金额</th>
            <th>备注</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody id="transactionsList">
    </tbody>
</table>

<div style="margin-top: 20px; text-align: center;" id="pagination">
</div>
{% endblock %}

{% block modals %}
<div class="modal" id="addTransactionModal">
    <div class="modal-content">
        <h2>➕ 添加记录</h2>
        <form id="addTransactionForm">
            <div class="tabs">
                <button type="button" class="tab active" data-type="expense" onclick="switchTransType('expense')">支出</button>
                <button type="button" class="tab" data-type="income" onclick="switchTransType('income')">收入</button>
            </div>
            
            <input type="hidden" name="type" value="expense">
            
            <div class="row">
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" name="date" value="{{ today }}" required>
                </div>
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" step="0.01" name="amount" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>分类</label>
                <select name="category_id" id="transCategory" required></select>
            </div>
            
            <div class="form-group">
                <label>账户</label>
                <select name="account_id" required>
                    {% for a in accounts %}
                    <option value="{{ a.id }}">{{ a.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>备注</label>
                <input type="text" name="note" placeholder="可选">
            </div>
            
            <div class="form-group">
                <label>标签（逗号分隔）</label>
                <input type="text" name="tags" placeholder="如：早餐,外卖">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button type="button" class="btn" onclick="closeModal('addTransactionModal')" style="flex: 1; background: #ecf0f1;">取消</button>
                <button type="submit" class="btn btn-primary" style="flex: 1;">保存</button>
            </div>
        </form>
    </div>
</div>

<div class="modal" id="editTransactionModal">
    <div class="modal-content">
        <h2>✏️ 编辑记录</h2>
        <form id="editTransactionForm">
            <input type="hidden" name="id">
            
            <div class="tabs">
                <button type="button" class="tab active" data-type="expense" onclick="switchEditType('expense')">支出</button>
                <button type="button" class="tab" data-type="income" onclick="switchEditType('income')">收入</button>
            </div>
            
            <input type="hidden" name="type" value="expense">
            
            <div class="row">
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" name="date" required>
                </div>
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" step="0.01" name="amount" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>分类</label>
                <select name="category_id" id="editCategory" required></select>
            </div>
            
            <div class="form-group">
                <label>账户</label>
                <select name="account_id" required>
                    {% for a in accounts %}
                    <option value="{{ a.id }}">{{ a.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>备注</label>
                <input type="text" name="note">
            </div>
            
            <div class="form-group">
                <label>标签</label>
                <input type="text" name="tags">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button type="button" class="btn" onclick="closeModal('editTransactionModal')" style="flex: 1; background: #ecf0f1;">取消</button>
                <button type="submit" class="btn btn-primary" style="flex: 1;">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;
let totalPages = 1;

function switchTransType(type) {
    document.querySelector('#addTransactionForm [name="type"]').value = type;
    document.querySelectorAll('#addTransactionModal .tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`#addTransactionModal [data-type="${type}"]`).classList.add('active');
    loadTransCategories(type, '#transCategory');
}

function switchEditType(type) {
    document.querySelector('#editTransactionForm [name="type"]').value = type;
    document.querySelectorAll('#editTransactionModal .tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`#editTransactionModal [data-type="${type}"]`).classList.add('active');
    loadTransCategories(type, '#editCategory');
}

function loadTransCategories(type, selector) {
    fetch(`/api/categories?type=${type}`)
        .then(r => r.json())
        .then(cats => {
            document.querySelector(selector).innerHTML = 
                cats.map(c => `<option value="${c.id}">${c.icon || ''} ${c.name}</option>`).join('');
        });
}

function loadTransactions(page = 1) {
    currentPage = page;
    const params = new URLSearchParams({
        page,
        type: document.getElementById('filterType').value,
        category_id: document.getElementById('filterCategory').value,
        account_id: document.getElementById('filterAccount').value,
        start_date: document.getElementById('startDate').value,
        end_date: document.getElementById('endDate').value,
        keyword: document.getElementById('keyword').value
    });
    
    fetch(`/api/transactions?${params}`)
        .then(r => r.json())
        .then(data => {
            totalPages = data.pages;
            const tbody = document.getElementById('transactionsList');
            tbody.innerHTML = data.items.map(t => `
                <tr>
                    <td>${t.date}</td>
                    <td><span style="color: ${t.type === 'income' ? '#27ae60' : '#e74c3c'}">${t.type === 'income' ? '收入' : '支出'}</span></td>
                    <td>${t.category || '-'}</td>
                    <td>${t.account}</td>
                    <td style="font-weight: bold; color: ${t.type === 'income' ? '#27ae60' : '#e74c3c'}">${t.type === 'income' ? '+' : '-'}${t.amount|formatMoney}</td>
                    <td>${t.note || '-'} ${t.tags ? t.tags.split(',').map(tag => `<span class="tag">${tag}</span>`).join('') : ''}</td>
                    <td>
                        <button class="btn btn-sm" onclick="editTransaction(${JSON.stringify(t).replace(/"/g, '&quot;')})" style="background: #f39c12; color: white;">✏️</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteTransaction(${t.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
            
            renderPagination();
        });
}

function renderPagination() {
    const pagination = document.getElementById('pagination');
    let html = '';
    if (currentPage > 1) html += `<button class="btn btn-sm" onclick="loadTransactions(${currentPage - 1})" style="background: #ecf0f1; margin: 0 5px;">上一页</button>`;
    html += `<span style="margin: 0 10px;">第 ${currentPage} / ${totalPages || 1} 页</span>`;
    if (currentPage < totalPages) html += `<button class="btn btn-sm" onclick="loadTransactions(${currentPage + 1})" style="background: #ecf0f1; margin: 0 5px;">下一页</button>`;
    pagination.innerHTML = html;
}

function editTransaction(t) {
    const form = document.getElementById('editTransactionForm');
    form.querySelector('[name="id"]').value = t.id;
    form.querySelector('[name="date"]').value = t.date;
    form.querySelector('[name="amount"]').value = t.amount;
    form.querySelector('[name="account_id"]').value = t.account_id;
    form.querySelector('[name="note"]').value = t.note || '';
    form.querySelector('[name="tags"]').value = t.tags || '';
    
    switchEditType(t.type);
    openModal('editTransactionModal');
}

function deleteTransaction(id) {
    if (confirm('确定删除这条记录？')) {
        fetch(`/api/transactions/${id}`, {method: 'DELETE'})
            .then(() => {
                showToast('删除成功');
                loadTransactions(currentPage);
            });
    }
}

document.getElementById('addTransactionForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData);
    
    fetch('/api/transactions', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(() => {
        showToast('添加成功');
        closeModal('addTransactionModal');
        loadTransactions();
    });
});

document.getElementById('editTransactionForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData);
    const id = data.id;
    delete data.id;
    
    fetch(`/api/transactions/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(() => {
        showToast('更新成功');
        closeModal('editTransactionModal');
        loadTransactions(currentPage);
    });
});

loadTransCategories('expense', '#transCategory');
loadTransactions();
</script>
{% endblock %}
