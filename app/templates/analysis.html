{% extends "base.html" %}

{% block title %}账单分析 - 个人理财助手{% endblock %}

{% block content %}
<div class="header">
    <h1>📊 账单分析</h1>
    <input type="month" id="monthSelect" value="{{ current_month }}" onchange="loadAnalysis()" style="padding: 10px; border-radius: 8px; border: 2px solid #ecf0f1;">
</div>

<div class="cards">
    <div class="card income">
        <h3>总收入</h3>
        <div class="amount" id="totalIncome">¥0.00</div>
    </div>
    <div class="card expense">
        <h3>总支出</h3>
        <div class="amount" id="totalExpense">¥0.00</div>
    </div>
    <div class="card">
        <h3>净收入</h3>
        <div class="amount" id="netIncome">¥0.00</div>
    </div>
    <div class="card">
        <h3>储蓄率</h3>
        <div class="amount" id="savingsRate">0%</div>
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
    <div class="chart-container">
        <h3 style="margin-bottom: 20px;">支出分类占比</h3>
        <canvas id="categoryChart"></canvas>
    </div>
    <div class="chart-container">
        <h3 style="margin-bottom: 20px;">日支出趋势</h3>
        <canvas id="dailyChart"></canvas>
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
    <div class="chart-container">
        <h3 style="margin-bottom: 20px;">工作日 vs 周末</h3>
        <canvas id="weekdayChart"></canvas>
    </div>
    <div class="chart-container">
        <h3 style="margin-bottom: 20px;">🔥 消费热点日</h3>
        <div id="hotSpots"></div>
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
    <div class="chart-container">
        <h3 style="margin-bottom: 20px;">📈 同比环比分析</h3>
        <div id="yoyMomData" style="line-height: 2;"></div>
    </div>
    <div class="chart-container">
        <h3 style="margin-bottom: 20px;">⚠️ 消费异常检测</h3>
        <div id="anomalyList">
            <p style="color: #7f8c8d; text-align: center;">加载中...</p>
        </div>
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="chart-container">
        <h3 style="margin-bottom: 20px;">📈 消费趋势预测</h3>
        <canvas id="predictionChart"></canvas>
        <div id="predictionInfo" style="margin-top: 15px; text-align: center;"></div>
    </div>
    <div class="chart-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>📊 年度财务总结</h3>
            <select id="annualYear" onchange="loadAnnualSummary()" style="padding: 8px; border-radius: 8px; border: 2px solid #ecf0f1;">
            </select>
        </div>
        <div id="annualSummary" style="line-height: 2;"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentMonth = new Date().toISOString().slice(0, 7);
let categoryChart = null;
let dailyChart = null;
let weekdayChart = null;
let predictionChart = null;

function initAnnualYearSelect() {
    const currentYear = new Date().getFullYear();
    const select = document.getElementById('annualYear');
    for (let y = currentYear - 2; y <= currentYear; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y + '年';
        if (y === currentYear) opt.selected = true;
        select.appendChild(opt);
    }
}

function loadAnalysis() {
    currentMonth = document.getElementById('monthSelect').value;
    
    fetch(`/api/analysis/monthly-summary?month=${currentMonth}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('totalIncome').textContent = formatMoney(data.income);
            document.getElementById('totalExpense').textContent = formatMoney(data.expense);
            document.getElementById('netIncome').textContent = formatMoney(data.net);
            document.getElementById('netIncome').style.color = data.net >= 0 ? '#27ae60' : '#e74c3c';
            
            const savingsRate = data.income > 0 ? (data.net / data.income * 100).toFixed(1) : 0;
            document.getElementById('savingsRate').textContent = savingsRate + '%';
            
            const ctx1 = document.getElementById('categoryChart').getContext('2d');
            if (categoryChart) categoryChart.destroy();
            categoryChart = new Chart(ctx1, {
                type: 'pie',
                data: {
                    labels: data.by_category.map(c => c.name),
                    datasets: [{
                        data: data.by_category.map(c => c.amount),
                        backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a', '#fee140', '#30cfd0', '#f6d365']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        });
    
    fetch(`/api/analysis/hot-days?month=${currentMonth}`)
        .then(r => r.json())
        .then(data => {
            const hotSpots = document.getElementById('hotSpots');
            if (data.length === 0) {
                hotSpots.innerHTML = '<p style="color: #7f8c8d; text-align: center; padding: 20px;">暂无数据</p>';
            } else {
                hotSpots.innerHTML = data.map((d, i) => `
                    <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #ecf0f1;">
                        <span><strong>${i + 1}.</strong> ${d.date.slice(5)}</span>
                        <span style="font-weight: bold; color: #e74c3c;">${formatMoney(d.amount)}</span>
                    </div>
                `).join('');
            }
        });
    
    fetch(`/api/analysis/daily-trend?month=${currentMonth}`)
        .then(r => r.json())
        .then(data => {
            const ctx2 = document.getElementById('dailyChart').getContext('2d');
            if (dailyChart) dailyChart.destroy();
            dailyChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date.slice(8)),
                    datasets: [{
                        label: '支出',
                        data: data.map(d => d.amount),
                        borderColor: '#e74c3c',
                        backgroundColor: 'rgba(231, 76, 60, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } }
                }
            });
        });
    
    fetch(`/api/analysis/weekday-vs-weekend?month=${currentMonth}`)
        .then(r => r.json())
        .then(data => {
            const ctx3 = document.getElementById('weekdayChart').getContext('2d');
            if (weekdayChart) weekdayChart.destroy();
            weekdayChart = new Chart(ctx3, {
                type: 'bar',
                data: {
                    labels: ['工作日', '周末'],
                    datasets: [{
                        label: '支出',
                        data: [data.weekday, data.weekend],
                        backgroundColor: ['#667eea', '#f39c12']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } }
                }
            });
        });
    
    fetch(`/api/analysis/anomaly-detection?month=${currentMonth}`)
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('anomalyList');
            if (data.length === 0) {
                container.innerHTML = '<p style="color: #27ae60; text-align: center; padding: 20px;">✅ 本月暂无消费异常</p>';
            } else {
                container.innerHTML = data.map(a => `
                    <div style="padding: 12px; margin-bottom: 10px; background: #fff3cd; border-left: 4px solid #f39c12; border-radius: 4px;">
                        <div style="font-weight: bold; color: #e74c3c; margin-bottom: 5px;">⚠️ ${a.category}</div>
                        <div style="font-size: 13px; color: #666;">
                            本月 ${formatMoney(a.current)} vs 上月 ${formatMoney(a.last)}<br>
                            <strong style="color: #e74c3c;">增长 ${a.change_rate.toFixed(1)}%</strong>
                        </div>
                    </div>
                `).join('');
            }
        });
    
    fetch(`/api/analysis/yoy-mom?month=${currentMonth}`)
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('yoyMomData');
            container.innerHTML = `
                <div style="padding: 10px 0; border-bottom: 1px solid #ecf0f1; display: flex; justify-content: space-between;">
                    <span>本月支出</span>
                    <span style="font-weight: bold;">${formatMoney(data.current)}</span>
                </div>
                <div style="padding: 10px 0; border-bottom: 1px solid #ecf0f1; display: flex; justify-content: space-between;">
                    <span>环比 (${data.mom_month})</span>
                    <span style="color: ${data.mom_rate >= 0 ? '#e74c3c' : '#27ae60'}; font-weight: bold;">
                        ${data.mom_rate >= 0 ? '+' : ''}${data.mom_rate.toFixed(1)}%
                    </span>
                </div>
                <div style="padding: 10px 0; display: flex; justify-content: space-between;">
                    <span>同比 (${data.yoy_month})</span>
                    <span style="color: ${data.yoy_rate >= 0 ? '#e74c3c' : '#27ae60'}; font-weight: bold;">
                        ${data.yoy_rate >= 0 ? '+' : ''}${data.yoy_rate.toFixed(1)}%
                    </span>
                </div>
            `;
        });
    
    fetch('/api/analysis/trend-prediction')
        .then(r => r.json())
        .then(data => {
            const ctx4 = document.getElementById('predictionChart').getContext('2d');
            if (predictionChart) predictionChart.destroy();
            
            if (data.months.length < 2) {
                document.getElementById('predictionInfo').innerHTML = '<p style="color: #7f8c8d;">数据不足，需要至少2个月数据</p>';
                return;
            }
            
            const nextMonth = new Date(data.months[data.months.length - 1] + '-01');
            nextMonth.setMonth(nextMonth.getMonth() + 1);
            const nextMonthStr = nextMonth.toISOString().slice(0, 7);
            
            predictionChart = new Chart(ctx4, {
                type: 'line',
                data: {
                    labels: [...data.months, nextMonthStr],
                    datasets: [
                        {
                            label: '实际支出',
                            data: [...data.amounts, null],
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '预测',
                            data: [...Array(data.months.length - 1).fill(null), data.amounts[data.amounts.length - 1], data.predicted],
                            borderColor: '#e74c3c',
                            borderDash: [5, 5],
                            backgroundColor: 'rgba(231, 76, 60, 0.1)',
                            fill: false,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
            
            document.getElementById('predictionInfo').innerHTML = `
                <p style="color: #2c3e50;">预测下月支出: <strong style="color: #e74c3c;">${formatMoney(data.predicted)}</strong></p>
                <p style="font-size: 12px; color: #7f8c8d;">基于近${data.months.length}个月数据线性预测</p>
            `;
        });
}

function loadAnnualSummary() {
    const year = document.getElementById('annualYear').value;
    fetch(`/api/analysis/annual-summary?year=${year}`)
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('annualSummary');
            container.innerHTML = `
                <div style="padding: 8px 0; border-bottom: 1px solid #ecf0f1; display: flex; justify-content: space-between;">
                    <span>💰 总收入</span>
                    <span style="color: #27ae60; font-weight: bold;">${formatMoney(data.total_income)}</span>
                </div>
                <div style="padding: 8px 0; border-bottom: 1px solid #ecf0f1; display: flex; justify-content: space-between;">
                    <span>💸 总支出</span>
                    <span style="color: #e74c3c; font-weight: bold;">${formatMoney(data.total_expense)}</span>
                </div>
                <div style="padding: 8px 0; border-bottom: 1px solid #ecf0f1; display: flex; justify-content: space-between;">
                    <span>🏦 净储蓄</span>
                    <span style="color: ${data.net_savings >= 0 ? '#27ae60' : '#e74c3c'}; font-weight: bold;">${formatMoney(data.net_savings)}</span>
                </div>
                <div style="padding: 8px 0; border-bottom: 1px solid #ecf0f1; display: flex; justify-content: space-between;">
                    <span>📈 储蓄率</span>
                    <span style="font-weight: bold;">${data.savings_rate}%</span>
                </div>
                <div style="padding: 8px 0; border-bottom: 1px solid #ecf0f1; display: flex; justify-content: space-between;">
                    <span>🏆 最花钱分类</span>
                    <span>${data.top_expense_category} (${formatMoney(data.top_expense_amount)})</span>
                </div>
                <div style="padding: 8px 0; display: flex; justify-content: space-between;">
                    <span>✨ 省钱最多月份</span>
                    <span>${data.best_savings_month}月</span>
                </div>
            `;
        });
}

initAnnualYearSelect();
loadAnnualSummary();
loadAnalysis();
</script>
{% endblock %}
