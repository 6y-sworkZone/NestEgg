{% extends "base.html" %}

{% block title %}预算管理 - 个人理财助手{% endblock %}

{% block content %}
<div class="header">
    <h1>🎯 预算管理</h1>
    <div style="display: flex; gap: 10px;">
        <input type="month" id="monthSelect" value="{{ month }}" onchange="changeMonth()" style="padding: 10px; border-radius: 8px; border: 2px solid #ecf0f1;">
        <button class="btn" onclick="openBudgetSuggestions()" style="background: #9b59b6; color: white;">💡 智能建议</button>
        <button class="btn btn-primary" onclick="openModal('addBudgetModal')">➕ 设置预算</button>
    </div>
</div>

<div class="cards">
    <div class="card">
        <h3>总预算</h3>
        <div class="amount" id="totalBudget">¥0.00</div>
    </div>
    <div class="card">
        <h3>已支出</h3>
        <div class="amount" id="totalSpent" style="color: #e74c3c;">¥0.00</div>
    </div>
    <div class="card">
        <h3>剩余</h3>
        <div class="amount" id="totalRemaining">¥0.00</div>
    </div>
    <div class="card">
        <h3>执行率</h3>
        <div class="amount" id="budgetRate">0%</div>
    </div>
</div>

<div id="budgetsList">
</div>

<div class="chart-container" style="margin-top: 20px;">
    <h3 style="margin-bottom: 20px;">📊 预算 vs 实际对比</h3>
    <canvas id="budgetChart" height="200"></canvas>
</div>

<div class="chart-container" style="margin-top: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3>📅 年度预算概览</h3>
        <select id="heatmapYear" onchange="loadAnnualHeatmap()" style="padding: 8px; border-radius: 8px; border: 2px solid #ecf0f1;">
        </select>
    </div>
    <div id="annualHeatmap" style="overflow-x: auto;"></div>
</div>
{% endblock %}

{% block modals %}
<div class="modal" id="addBudgetModal">
    <div class="modal-content">
        <h2>➕ 设置预算</h2>
        <form id="addBudgetForm">
            <div class="form-group">
                <label>分类</label>
                <select name="category_id" required>
                    {% for c in categories %}
                    <option value="{{ c.id }}">{{ c.icon }} {{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>预算金额</label>
                <input type="number" step="0.01" name="amount" required placeholder="0.00">
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="button" class="btn" onclick="closeModal('addBudgetModal')" style="flex: 1; background: #ecf0f1;">取消</button>
                <button type="submit" class="btn btn-primary" style="flex: 1;">保存</button>
            </div>
        </form>
    </div>
</div>

<div class="modal" id="budgetSuggestionsModal">
    <div class="modal-content" style="max-width: 600px;">
        <h2>💡 智能预算建议</h2>
        <p style="color: #7f8c8d; margin-bottom: 15px;">基于过去3个月消费数据生成建议</p>
        <div id="suggestionsList" style="max-height: 400px; overflow-y: auto; margin-bottom: 20px;"></div>
        <div style="display: flex; gap: 10px;">
            <button type="button" class="btn" onclick="closeModal('budgetSuggestionsModal')" style="flex: 1; background: #ecf0f1;">关闭</button>
            <button type="button" class="btn btn-primary" onclick="applyAllSuggestions()" style="flex: 1;">一键应用所有</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentMonth = '{{ month }}';
let budgetChart = null;

function changeMonth() {
    currentMonth = document.getElementById('monthSelect').value;
    loadBudgets();
}

function loadBudgets() {
    fetch(`/api/budgets?month=${currentMonth}`)
        .then(r => r.json())
        .then(data => {
            const totalBudget = data.reduce((sum, b) => sum + b.amount, 0);
            const totalSpent = data.reduce((sum, b) => sum + b.spent, 0);
            const remaining = totalBudget - totalSpent;
            const rate = totalBudget > 0 ? (totalSpent / totalBudget * 100).toFixed(1) : 0;
            
            document.getElementById('totalBudget').textContent = formatMoney(totalBudget);
            document.getElementById('totalSpent').textContent = formatMoney(totalSpent);
            document.getElementById('totalRemaining').textContent = formatMoney(remaining);
            document.getElementById('totalRemaining').style.color = remaining >= 0 ? '#27ae60' : '#e74c3c';
            document.getElementById('budgetRate').textContent = rate + '%';
            
            const container = document.getElementById('budgetsList');
            container.innerHTML = data.map(b => {
                const percentage = b.percentage;
                let statusClass = '';
                if (percentage >= 100) statusClass = 'danger';
                else if (percentage >= 80) statusClass = 'warning';
                
                return `
                    <div class="budget-item">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h4>${b.category_name}</h4>
                            <span style="font-weight: bold; ${percentage >= 100 ? 'color: #e74c3c' : percentage >= 80 ? 'color: #f39c12' : ''}">${formatMoney(b.spent)} / ${formatMoney(b.amount)}</span>
                        </div>
                        <div class="progress-bar ${statusClass}">
                            <div class="progress" style="width: ${Math.min(percentage, 100)}%"></div>
                        </div>
                        <div style="margin-top: 8px; display: flex; justify-content: space-between; font-size: 12px; color: #7f8c8d;">
                            <span>${percentage.toFixed(1)}% 已使用</span>
                            <span>剩余: ${formatMoney(b.amount - b.spent)}</span>
                        </div>
                        ${percentage >= 100 ? '<div style="margin-top: 8px; color: #e74c3c; font-size: 13px;">⚠️ 已超支！</div>' : percentage >= 80 ? '<div style="margin-top: 8px; color: #f39c12; font-size: 13px;">⚠️ 即将超支</div>' : ''}
                    </div>
                `;
            }).join('');
            
            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state"><i>🎯</i><p>还没有设置预算，点击上方按钮开始设置</p></div>';
            }
            
            updateBudgetChart(data);
        });
}

function updateBudgetChart(data) {
    const ctx = document.getElementById('budgetChart').getContext('2d');
    if (budgetChart) budgetChart.destroy();
    
    budgetChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: data.map(b => b.category_name),
            datasets: [
                {
                    label: '预算',
                    data: data.map(b => b.amount),
                    backgroundColor: 'rgba(102, 126, 234, 0.6)',
                    borderColor: '#667eea',
                    borderWidth: 1
                },
                {
                    label: '实际',
                    data: data.map(b => b.spent),
                    backgroundColor: data.map(b => b.percentage >= 100 ? 'rgba(231, 76, 60, 0.6)' : b.percentage >= 80 ? 'rgba(243, 156, 18, 0.6)' : 'rgba(39, 174, 96, 0.6)'),
                    borderColor: data.map(b => b.percentage >= 100 ? '#e74c3c' : b.percentage >= 80 ? '#f39c12' : '#27ae60'),
                    borderWidth: 1
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            },
            plugins: {
                legend: { position: 'top' }
            }
        }
    });
}

document.getElementById('addBudgetForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData);
    data.month = currentMonth;
    
    fetch('/api/budgets', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(() => {
        showToast('预算设置成功');
        closeModal('addBudgetModal');
        loadBudgets();
        this.reset();
    });
});

let budgetSuggestions = [];

function openBudgetSuggestions() {
    fetch('/api/budgets/suggestions')
        .then(r => r.json())
        .then(data => {
            budgetSuggestions = data;
            const container = document.getElementById('suggestionsList');
            container.innerHTML = data.map(s => `
                <div style="display: flex; justify-content: space-between; align-items: center; 
                            padding: 12px; margin-bottom: 8px; background: #f8f9fa; border-radius: 8px;">
                    <div>
                        <strong>${s.category_name}</strong>
                        <div style="font-size: 12px; color: #7f8c8d;">
                            3月平均: ${formatMoney(s.avg_3months)}
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-weight: bold; color: #667eea;">${formatMoney(s.suggested)}</span>
                        <button class="btn btn-sm btn-primary" onclick="applySingleSuggestion(${s.category_id}, ${s.suggested})">应用</button>
                    </div>
                </div>
            `).join('');
            openModal('budgetSuggestionsModal');
        });
}

function applySingleSuggestion(categoryId, amount) {
    fetch('/api/budgets', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({category_id: categoryId, amount, month: currentMonth})
    }).then(() => {
        showToast('已应用建议');
        loadBudgets();
    });
}

function applyAllSuggestions() {
    const promises = budgetSuggestions.map(s => 
        fetch('/api/budgets', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({category_id: s.category_id, amount: s.suggested, month: currentMonth})
        })
    );
    
    Promise.all(promises).then(() => {
        showToast('已应用所有建议');
        closeModal('budgetSuggestionsModal');
        loadBudgets();
    });
}

function initHeatmapYearSelect() {
    const currentYear = new Date().getFullYear();
    const select = document.getElementById('heatmapYear');
    for (let y = currentYear - 2; y <= currentYear; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y + '年';
        if (y === currentYear) opt.selected = true;
        select.appendChild(opt);
    }
}

function loadAnnualHeatmap() {
    const year = document.getElementById('heatmapYear').value;
    fetch(`/api/budgets/annual-overview?year=${year}`)
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById('annualHeatmap');
            let html = '<table style="font-size: 12px; min-width: 600px;"><thead><tr><th>分类</th>';
            for (let m = 1; m <= 12; m++) {
                html += `<th style="width: 40px; text-align: center;">${m}月</th>`;
            }
            html += '</tr></thead><tbody>';
            
            data.data.forEach(cat => {
                html += `<tr><td style="padding: 6px; white-space: nowrap;">${cat.category_name}</td>`;
                cat.months.forEach(m => {
                    const rate = m.execution_rate;
                    let bg = '#f8f9fa';
                    let color = '#333';
                    if (rate > 0) {
                        if (rate >= 100) { bg = '#e74c3c'; color = 'white'; }
                        else if (rate >= 80) { bg = '#f39c12'; color = 'white'; }
                        else if (rate >= 50) { bg = '#f1c40f'; color = '#333'; }
                        else if (rate >= 20) { bg = '#2ecc71'; color = 'white'; }
                        else { bg = '#27ae60'; color = 'white'; }
                    }
                    html += `<td style="background: ${bg}; color: ${color}; text-align: center; padding: 4px; border-radius: 4px;" title="预算: ${m.budget.toFixed(0)}, 支出: ${m.spent.toFixed(0)}, 执行率: ${rate.toFixed(1)}%">${rate >= 100 ? '💥' : rate >= 80 ? '⚠️' : rate >= 50 ? '✓' : '•'}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            html += '<div style="margin-top: 15px; display: flex; gap: 15px; font-size: 12px; color: #7f8c8d;">';
            html += '<span>💥 超支</span><span>⚠️ 接近超支</span><span>✓ 正常</span><span>• 预算充足</span>';
            html += '</div>';
            container.innerHTML = html;
        });
}

initHeatmapYearSelect();
loadAnnualHeatmap();
loadBudgets();
</script>
{% endblock %}
