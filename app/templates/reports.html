{% extends "base.html" %}

{% block title %}报表导出 - 个人理财助手{% endblock %}

{% block content %}
<div class="header">
    <h1>📋 报表导出</h1>
</div>

<div class="chart-container" style="text-align: center; padding: 40px;">
    <h2>🏆 财务健康评分</h2>
    <div class="health-score">
        <div class="score" id="healthScore">--</div>
        <div id="scoreDetails" style="margin-top: 20px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto;"></div>
    </div>
</div>

<div class="chart-container">
    <h3 style="margin-bottom: 20px;">💡 理财建议</h3>
    <div id="suggestions" style="line-height: 2;"></div>
</div>

<div class="chart-container">
    <h3 style="margin-bottom: 20px;">📥 导出报表</h3>
    <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
        <div class="form-group" style="margin-bottom: 0; min-width: 150px;">
            <label>选择月份</label>
            <input type="month" id="reportMonth" value="{{ current_month }}">
        </div>
        <button class="btn btn-primary" onclick="exportExcel()">📊 导出 Excel</button>
        <button class="btn btn-success" onclick="exportPDF()">📄 导出 PDF</button>
    </div>
</div>

<div class="chart-container">
    <h3 style="margin-bottom: 20px;">⏰ 周期性收支提醒</h3>
    <button class="btn btn-primary btn-sm" onclick="openModal('recurringModal')" style="margin-bottom: 20px;">➕ 添加提醒</button>
    <table>
        <thead>
            <tr>
                <th>名称</th>
                <th>类型</th>
                <th>金额</th>
                <th>频率</th>
                <th>下次执行</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="recurringList">
        </tbody>
    </table>
</div>
{% endblock %}

{% block modals %}
<div class="modal" id="recurringModal">
    <div class="modal-content">
        <h2>➕ 添加周期性收支</h2>
        <form id="recurringForm">
            <div class="form-group">
                <label>名称</label>
                <input type="text" name="name" required placeholder="如：房租、工资">
            </div>
            <div class="row">
                <div class="form-group">
                    <label>类型</label>
                    <select name="type" required>
                        <option value="income">收入</option>
                        <option value="expense">支出</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>金额</label>
                    <input type="number" step="0.01" name="amount" required>
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>频率</label>
                    <select name="frequency">
                        <option value="monthly">每月</option>
                        <option value="weekly">每周</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>每月日期</label>
                    <input type="number" min="1" max="31" name="day_of_month" value="1">
                </div>
            </div>
            <div class="form-group">
                <label>关联账户</label>
                <select name="account_id" required>
                    {% for a in accounts %}
                    <option value="{{ a.id }}">{{ a.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="button" class="btn" onclick="closeModal('recurringModal')" style="flex: 1; background: #ecf0f1;">取消</button>
                <button type="submit" class="btn btn-primary" style="flex: 1;">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function loadHealthScore() {
    fetch('/api/health-score')
        .then(r => r.json())
        .then(data => {
            document.getElementById('healthScore').textContent = data.score;
            
            document.getElementById('scoreDetails').innerHTML = `
                <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #ecf0f1;">
                    <span>储蓄率得分</span>
                    <span style="font-weight: bold;">${data.savings_score.toFixed(0)} / 100</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #ecf0f1;">
                    <span>预算执行得分</span>
                    <span style="font-weight: bold;">${data.budget_score.toFixed(0)} / 100</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 10px 0;">
                    <span>投资多样性得分</span>
                    <span style="font-weight: bold;">${data.diversity_score.toFixed(0)} / 100</span>
                </div>
            `;
            
            document.getElementById('suggestions').innerHTML = data.suggestions.map(s => 
                `<div>💡 ${s}</div>`
            ).join('');
        });
}

function loadRecurring() {
    fetch('/api/recurring')
        .then(r => r.json())
        .then(data => {
            const tbody = document.getElementById('recurringList');
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${r.name}</td>
                    <td><span style="color: ${r.type === 'income' ? '#27ae60' : '#e74c3c'}">${r.type === 'income' ? '收入' : '支出'}</span></td>
                    <td style="font-weight: bold;">${formatMoney(r.amount)}</td>
                    <td>${r.frequency === 'monthly' ? '每月' : '每周'}</td>
                    <td>${r.next_run_date}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="deleteRecurring(${r.id})">🗑️</button></td>
                </tr>
            `).join('');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #7f8c8d;">暂无周期性收支</td></tr>';
            }
        });
}

function deleteRecurring(id) {
    if (confirm('确定删除？')) {
        fetch(`/api/recurring/${id}`, {method: 'DELETE'})
            .then(() => {
                showToast('删除成功');
                loadRecurring();
            });
    }
}

function exportExcel() {
    const month = document.getElementById('reportMonth').value;
    window.location.href = `/api/reports/export/excel?month=${month}`;
}

function exportPDF() {
    const month = document.getElementById('reportMonth').value;
    window.location.href = `/api/reports/export/pdf?month=${month}`;
}

document.getElementById('recurringForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData);
    
    fetch('/api/recurring', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(() => {
        showToast('添加成功');
        closeModal('recurringModal');
        loadRecurring();
        this.reset();
    });
});

loadHealthScore();
loadRecurring();
</script>
{% endblock %}
