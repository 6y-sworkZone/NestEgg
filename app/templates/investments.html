{% extends "base.html" %}

{% block title %}投资追踪 - 个人理财助手{% endblock %}

{% block content %}
<div class="header">
    <h1>📈 投资追踪</h1>
    <button class="btn btn-primary" onclick="openModal('addInvestmentModal')">➕ 添加持仓</button>
</div>

<div class="cards">
    <div class="card">
        <h3>总市值</h3>
        <div class="amount" id="totalValue">¥0.00</div>
    </div>
    <div class="card">
        <h3>总盈亏</h3>
        <div class="amount" id="totalProfit">¥0.00</div>
    </div>
    <div class="card">
        <h3>收益率</h3>
        <div class="amount" id="profitRate">0%</div>
    </div>
    <div class="card">
        <h3>持仓数量</h3>
        <div class="amount" id="holdCount">0</div>
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
    <div class="chart-container">
        <h3 style="margin-bottom: 20px;">资产配置</h3>
        <canvas id="allocationChart"></canvas>
    </div>
    <div class="chart-container">
        <h3 style="margin-bottom: 20px;">收益走势</h3>
        <canvas id="profitChart"></canvas>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>名称</th>
            <th>类型</th>
            <th>持仓</th>
            <th>买入价</th>
            <th>现价</th>
            <th>市值</th>
            <th>盈亏</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody id="investmentsList">
    </tbody>
</table>
{% endblock %}

{% block modals %}
<div class="modal" id="addInvestmentModal">
    <div class="modal-content">
        <h2>➕ 添加持仓</h2>
        <form id="addInvestmentForm">
            <div class="form-group">
                <label>账户</label>
                <select name="account_id" required>
                    {% for a in accounts %}
                    <option value="{{ a.id }}">{{ a.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>投资名称</label>
                    <input type="text" name="name" required placeholder="如：贵州茅台">
                </div>
                <div class="form-group">
                    <label>代码</label>
                    <input type="text" name="code" placeholder="如：600519">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>类型</label>
                    <select name="type">
                        <option value="股票">股票</option>
                        <option value="基金">基金</option>
                        <option value="定期">定期</option>
                        <option value="债券">债券</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>买入日期</label>
                    <input type="date" name="buy_date" value="{{ today }}">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>买入价</label>
                    <input type="number" step="0.01" name="buy_price" required>
                </div>
                <div class="form-group">
                    <label>数量</label>
                    <input type="number" step="0.01" name="quantity" required>
                </div>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea name="notes" rows="3" placeholder="买入理由等"></textarea>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="button" class="btn" onclick="closeModal('addInvestmentModal')" style="flex: 1; background: #ecf0f1;">取消</button>
                <button type="submit" class="btn btn-primary" style="flex: 1;">保存</button>
            </div>
        </form>
    </div>
</div>

<div class="modal" id="updatePriceModal">
    <div class="modal-content">
        <h2>💰 更新价格</h2>
        <form id="updatePriceForm">
            <input type="hidden" name="id">
            <div class="form-group">
                <label id="investmentNameLabel">投资名称</label>
            </div>
            <div class="form-group">
                <label>当前价格</label>
                <input type="number" step="0.01" name="current_price" required>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="button" class="btn" onclick="closeModal('updatePriceModal')" style="flex: 1; background: #ecf0f1;">取消</button>
                <button type="submit" class="btn btn-primary" style="flex: 1;">更新</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let investments = [];
let allocationChart = null;
let profitChart = null;

function loadInvestments() {
    fetch('/api/investments')
        .then(r => r.json())
        .then(data => {
            investments = data;
            
            const totalValue = data.reduce((sum, i) => sum + i.total_value, 0);
            const totalCost = data.reduce((sum, i) => sum + (i.buy_price * i.quantity), 0);
            const totalProfit = data.reduce((sum, i) => sum + i.profit, 0);
            const profitRate = totalCost > 0 ? (totalProfit / totalCost * 100).toFixed(2) : 0;
            
            document.getElementById('totalValue').textContent = totalValue|formatMoney;
            document.getElementById('totalProfit').textContent = (totalProfit >= 0 ? '+' : '') + totalProfit|formatMoney;
            document.getElementById('totalProfit').style.color = totalProfit >= 0 ? '#27ae60' : '#e74c3c';
            document.getElementById('profitRate').textContent = (profitRate >= 0 ? '+' : '') + profitRate + '%';
            document.getElementById('profitRate').style.color = profitRate >= 0 ? '#27ae60' : '#e74c3c';
            document.getElementById('holdCount').textContent = data.length;
            
            const tbody = document.getElementById('investmentsList');
            tbody.innerHTML = data.map(i => `
                <tr>
                    <td><strong>${i.name}</strong><br><small>${i.code || ''}</small></td>
                    <td>${i.type || '-'}</td>
                    <td>${i.quantity}</td>
                    <td>${i.buy_price|formatMoney}</td>
                    <td>${i.current_price|formatMoney}</td>
                    <td>${i.total_value|formatMoney}</td>
                    <td style="color: ${i.profit >= 0 ? '#27ae60' : '#e74c3c'}">
                        ${i.profit >= 0 ? '+' : ''}${i.profit|formatMoney}<br>
                        <small>${i.profit_rate.toFixed(2)}%</small>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="openUpdatePrice(${i.id}, '${i.name}', ${i.current_price})">💰</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteInvestment(${i.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
            
            updateCharts(data);
        });
}

function updateCharts(data) {
    const typeData = {};
    data.forEach(i => {
        const type = i.type || '其他';
        typeData[type] = (typeData[type] || 0) + i.total_value;
    });
    
    const ctx1 = document.getElementById('allocationChart').getContext('2d');
    if (allocationChart) allocationChart.destroy();
    allocationChart = new Chart(ctx1, {
        type: 'pie',
        data: {
            labels: Object.keys(typeData),
            datasets: [{
                data: Object.values(typeData),
                backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b']
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom' } }
        }
    });
    
    const ctx2 = document.getElementById('profitChart').getContext('2d');
    if (profitChart) profitChart.destroy();
    profitChart = new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: data.map(i => i.name),
            datasets: [{
                label: '盈亏',
                data: data.map(i => i.profit),
                backgroundColor: data.map(i => i.profit >= 0 ? '#27ae60' : '#e74c3c')
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } }
        }
    });
}

function openUpdatePrice(id, name, currentPrice) {
    document.querySelector('#updatePriceForm [name="id"]').value = id;
    document.getElementById('investmentNameLabel').textContent = name;
    document.querySelector('#updatePriceForm [name="current_price"]').value = currentPrice;
    openModal('updatePriceModal');
}

function deleteInvestment(id) {
    if (confirm('确定删除这个持仓？')) {
        fetch(`/api/investments/${id}`, {method: 'DELETE'})
            .then(() => {
                showToast('删除成功');
                loadInvestments();
            });
    }
}

document.getElementById('addInvestmentForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData);
    
    fetch('/api/investments', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(() => {
        showToast('添加成功');
        closeModal('addInvestmentModal');
        loadInvestments();
        this.reset();
    });
});

document.getElementById('updatePriceForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData);
    const id = data.id;
    delete data.id;
    
    fetch(`/api/investments/${id}/update-price`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(() => {
        showToast('价格更新成功');
        closeModal('updatePriceModal');
        loadInvestments();
    });
});

loadInvestments();
</script>
{% endblock %}
